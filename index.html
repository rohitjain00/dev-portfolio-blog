    <script>
      (function() {
        var themes = ['default-light', 'default-dark', 'solarized-light', 'solarized-dark', 'sepia-light', 'sepia-dark'];
        try {
          var theme = localStorage.getItem('theme');
          if (themes.indexOf(theme) === -1) {
            return;
          }
          document.documentElement.setAttribute('data-theme', theme);
        } catch (error) {
          return;
        }
      })();
    </script>
